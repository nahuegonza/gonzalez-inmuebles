    <!-- Tailwind Configuration -->

                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',

        }

    <style>

                <a href="../index.html" class="py-3 px-3 rounded-xl hover:bg-gray-50 font-medium text-sm">Inicio</a>
                <a href="properties.html" class="py-3 px-3 rounded-xl bg-brand-green/5 text-brand-green font-bold text-sm">Propiedades</a>
                <a href="tasacion.html" class="py-3 px-3 rounded-xl hover:bg-gray-50 font-medium text-sm">Tasación</a>
                <a href="contacto.html" class="py-3 px-3 rounded-xl hover:bg-gray-50 font-medium text-sm">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-6 py-12">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Sidebar de Filtros -->
            <aside class="w-full lg:w-64 shrink-0">
                <div class="bg-white p-6 rounded-2xl shadow-soft lg:sticky lg:top-24">
                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="filter" class="w-5 h-5"></i> Filtros
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- Operación -->
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-brand-gray mb-2">Operación</label>
                            <select id="filterOperation" onchange="filterProperties()" class="filter-select">
                                <option value="">Todas</option>
                                <option value="Venta">Venta</option>
                                <option value="Alquiler">Alquiler</option>
                            </select>
                        </div>

                        <!-- Tipo -->
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-brand-gray mb-2">Tipo de Inmueble</label>
                            <select id="filterType" onchange="filterProperties()" class="filter-select">
                                <option value="">Todos</option>
                                <option value="Casa">Casa</option>
                                <option value="Ph">Ph</option>
                                <option value="Departamento">Departamento</option>
                                <option value="Terreno">Terreno</option>
                            </select>
                        </div>

                        <!-- Precio -->
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-brand-gray mb-2">Precio</label>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="filterMinPrice" placeholder="Min" oninput="filterProperties()" class="filter-select text-xs">
                                <input type="number" id="filterMaxPrice" placeholder="Max" oninput="filterProperties()" class="filter-select text-xs">
                            </div>
                        </div>

                        <!-- Ubicación con autocompletado -->
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-brand-gray mb-2">Ubicación</label>
                            <div class="relative">
                                <input type="text" id="filterLocation" placeholder="Ej: Palermo..." autocomplete="off"
                                       class="filter-select pr-8" oninput="handleLocationInput()">
                                <div id="locationSuggestions" class="absolute z-20 bg-white border border-gray-200 shadow-xl w-full mt-1 rounded-xl hidden max-h-48 overflow-y-auto"></div>
                            </div>
                            <div id="locationTags" class="flex flex-wrap gap-1.5 mt-2"></div>
                        </div>

                        <!-- Ordenar -->
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-brand-gray mb-2">Ordenar por</label>
                            <select id="filterSort" onchange="filterProperties()" class="filter-select">
                                <option value="">Destacados</option>
                                <option value="asc">Menor precio</option>
                                <option value="desc">Mayor precio</option>
                            </select>
                        </div>

                        <button onclick="resetFilters()" class="w-full py-2 text-sm text-brand-gray hover:text-brand-dark transition-colors font-medium">
                            Limpiar filtros
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Resultados -->
            <div class="flex-1">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold font-heading">Propiedades Disponibles</h1>
                        <p id="resultCount" class="text-sm text-brand-gray mt-1"></p>
                    </div>
                </div>

                <div id="propertiesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Dinámico -->
                </div>

                <!-- Estado vacío -->
                <div id="emptyState" class="hidden text-center py-24 bg-white rounded-3xl border border-dashed border-gray-200">
                    <i data-lucide="search-x" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
                    <h3 class="text-lg font-bold text-gray-700">No encontramos lo que buscás</h3>
                    <p class="text-gray-500">Probá ajustando los filtros de búsqueda.</p>
                </div>
            </div>
        </div>
    </main>

                <p>&copy; 2026 González Inmuebles. Todos los derechos reservados.</p>
                <div class="flex items-center gap-3 text-white">
                    <a href="https://www.facebook.com/share/1Gak2pDKeU/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" aria-label="Facebook" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                        <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current" aria-hidden="true"><path d="M22 12A10 10 0 1 0 10.44 21.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.88 3.77-3.88 1.09 0 2.23.2 2.23.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.77l-.44 2.89h-2.33v6.99A10 10 0 0 0 22 12z"/></svg>

                    <a href="https://www.instagram.com/gonzalez_inmuebles?igsh=ZXV3OGNxam5hMHNi" target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                        <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current" aria-hidden="true"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.8A3.95 3.95 0 0 0 3.8 7.75v8.5a3.95 3.95 0 0 0 3.95 3.95h8.5a3.95 3.95 0 0 0 3.95-3.95v-8.5a3.95 3.95 0 0 0-3.95-3.95h-8.5zM17.7 6.35a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4z"/></svg>
                    </a>
                    <a href="https://www.tiktok.com/@gonzalez.inmuebles?_r=1&_t=ZS-95otYmw6Mss" target="_blank" rel="noopener noreferrer" aria-label="TikTok" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                        <i data-lucide="music-2" class="w-4 h-4"></i>
                    </a>
                    <a href="https://wa.me/message/CT6J2GLTSVDZG1" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                        <i data-lucide="message-circle" class="w-4 h-4"></i>

                    <a href="mailto:info@gonzalezinmuebles.com.ar" aria-label="Email" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">

    <!-- Scripts -->
    <script src="../js/main.js"></script>
    <script>
        function togglePropMenu() {
            const menu = document.getElementById('propMobileMenu');
            const btn = document.getElementById('propMenuBtn');
            menu.classList.toggle('hidden');
            const icon = btn.querySelector('i');
            if (icon) { icon.setAttribute('data-lucide', menu.classList.contains('hidden') ? 'menu' : 'x'); lucide.createIcons(); }
        }

        // Chips de ubicación seleccionados
        let selectedLocations = [];

        function resetFilters() {
            document.getElementById('filterOperation').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterMinPrice').value = '';
            document.getElementById('filterMaxPrice').value = '';
            document.getElementById('filterSort').value = '';
            document.getElementById('filterLocation').value = '';
            selectedLocations = [];
            renderLocationTags();
            filterProperties();
        }

        function renderLocationTags() {
            const container = document.getElementById('locationTags');
            container.innerHTML = selectedLocations.map(loc => `
                <span class="flex items-center gap-1 bg-brand-green/10 text-brand-green text-xs font-semibold px-2.5 py-1 rounded-full">
                    ${loc}
                    <button onclick="removeLocationTag('${loc.replace(/'/g, "\\'")}')" class="hover:text-red-500 leading-none">×</button>
                </span>
            `).join('');
            filterProperties();
        }

        function removeLocationTag(loc) {
            selectedLocations = selectedLocations.filter(l => l !== loc);
            renderLocationTags();
        }

        let _locTimer;
        function handleLocationInput() {
            const val = document.getElementById('filterLocation').value;
            const box = document.getElementById('locationSuggestions');
            clearTimeout(_locTimer);
            if (val.length < 3) { box.classList.add('hidden'); return; }
            _locTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&countrycodes=ar&limit=6`);
                    const data = await res.json();
                    if (!data.length) { box.classList.add('hidden'); return; }
                    box.innerHTML = data.map(item => {
                        const label = item.display_name.split(',').slice(0, 2).join(',').trim();
                        return `<div class="p-3 hover:bg-green-50 cursor-pointer text-xs font-semibold text-gray-700 border-b border-gray-50 last:border-0"
                                     onclick="selectLocation('${label.replace(/'/g, "\\'")}')">
                                    📍 ${label}
                                </div>`;
                    }).join('');
                    box.classList.remove('hidden');
                } catch(e) { box.classList.add('hidden'); }
            }, 350);
        }

        function selectLocation(loc) {
            if (!selectedLocations.includes(loc)) {
                selectedLocations.push(loc);
                renderLocationTags();
            }
            document.getElementById('filterLocation').value = '';
            document.getElementById('locationSuggestions').classList.add('hidden');
        }

        // Cerrar sugerencias al hacer clic afuera
        document.addEventListener('click', e => {
            if (!e.target.closest('#filterLocation') && !e.target.closest('#locationSuggestions')) {
                document.getElementById('locationSuggestions').classList.add('hidden');
            }
        });

        // Sobreescribir filterProperties para incluir ubicación y conteo
        const _origFilter = window.filterProperties;
        window.filterProperties = () => {
            _origFilter();
            // Filtrar por ubicaciones seleccionadas (chips)
            if (selectedLocations.length > 0 && window.filteredProperties) {
                window.filteredProperties = window.filteredProperties.filter(p =>
                    selectedLocations.some(loc =>
                        p.location.toLowerCase().includes(loc.toLowerCase().split(',')[0].trim())
                    )
                );
                window.renderPublicProperties();
            }
            // Actualizar conteo
            const grid = document.getElementById('propertiesGrid');
            const count = grid ? grid.children.length : 0;
            const el = document.getElementById('resultCount');
            if (el) el.textContent = count > 0 ? `${count} propiedad${count !== 1 ? 'es' : ''} encontrada${count !== 1 ? 's' : ''}` : '';
        };
    </script>
</body>
</html>
